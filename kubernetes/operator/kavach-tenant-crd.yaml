apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: kavachtenants.kavachid.local
spec:
  group: kavachid.local
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - name
                - adminEmail
                - adminPassword
              properties:
                name:
                  type: string
                adminEmail:
                  type: string
                  format: email
                adminPassword:
                  type: string
                  minLength: 8
            status:
              type: object
              properties:
                phase:
                  type: string
                message:
                  type: string
                tenantId:
                  type: string
                createdAt:
                  type: string
  scope: Namespaced
  names:
    plural: kavachtenants
    singular: kavachtenant
    kind: KavachTenant
    shortNames:
      - kt
