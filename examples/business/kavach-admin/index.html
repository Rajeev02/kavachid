<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kavach Admin - User Directories</title>
  <link rel="stylesheet" href="../../shared/styles.css">
</head>
<body>
  <header>
    <h1>🛡️ <span class="app-name">Kavach Admin</span></h1>
    <div class="nav-links">
      <span class="badge">Business</span>
      <button class="btn btn-secondary" id="logout-btn" style="padding: 0.5rem 1rem; font-size: 0.8rem;">Log Out</button>
    </div>
  </header>

  <main class="main-container">
    <div id="auth-view"></div>

    <div id="dashboard-view" style="display: none;">
      <!-- Admin stats -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-label">Total Users</div>
          <div class="stat-value" id="stats-total-users">2</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Admin Role Mappings</div>
          <div class="stat-value">1</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Auditable Actions Captured</div>
          <div class="stat-value success-text">42</div>
        </div>
      </div>

      <div class="dashboard-grid">
        <!-- Main Panel -->
        <div class="card">
          <div class="card-header">
            <h3>Tenant Users Directory</h3>
            <button class="btn" id="refresh-users-btn" style="padding: 0.25rem 0.75rem; font-size: 0.75rem;">Refresh List</button>
          </div>
          <table id="users-table">
            <thead>
              <tr>
                <th>User ID</th>
                <th>Email Address</th>
                <th>Username</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody>
              <!-- User listings injected dynamically -->
            </tbody>
          </table>

          <div id="admin-status" style="margin-top: 1.5rem; display: none;" class="card"></div>
        </div>

        <!-- Sidebar Sessions -->
        <div class="card">
          <div class="card-header">
            <h3>Active Security Sessions</h3>
          </div>
          <div id="sessions-list">
            <p style="color: var(--text-muted); font-size: 0.85rem;">Loading active sessions...</p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
