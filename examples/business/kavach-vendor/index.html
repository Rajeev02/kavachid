<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kavach Vendor - Inventory Logs</title>
  <link rel="stylesheet" href="../../shared/styles.css">
</head>
<body>
  <header>
    <h1>🛡️ <span class="app-name">Kavach Vendor</span></h1>
    <div class="nav-links">
      <span class="badge">Business</span>
      <button class="btn btn-secondary" id="logout-btn" style="padding: 0.5rem 1rem; font-size: 0.8rem;">Log Out</button>
    </div>
  </header>

  <main class="main-container">
    <div id="auth-view"></div>

    <div id="dashboard-view" style="display: none;">
      <!-- Inventory summary -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-label">Total SKUs Tracked</div>
          <div class="stat-value">48</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">In-Stock items</div>
          <div class="stat-value success-text">4,250 Units</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Out of Stock Warnings</div>
          <div class="stat-value" style="color: var(--danger-color);">3 SKUs</div>
        </div>
      </div>

      <div class="dashboard-grid">
        <!-- Main Panel -->
        <div class="card">
          <div class="card-header">
            <h3>Add New Inventory Stock</h3>
          </div>
          <form id="stock-form">
            <div class="form-group">
              <label for="item-name">Item Description</label>
              <input type="text" id="item-name" required placeholder="e.g. Ergonomic Office Chair">
            </div>
            <div class="form-group">
              <label for="item-sku">SKU Code</label>
              <input type="text" id="item-sku" required placeholder="e.g. FUR-CHR-01">
            </div>
            <div class="form-group">
              <label for="item-qty">Quantity to Restock</label>
              <input type="number" id="item-qty" required min="1" placeholder="50">
            </div>
            <button type="submit" class="btn" id="add-stock-btn">Verify and Restock SKU</button>
          </form>

          <div id="stock-status" style="margin-top: 1.5rem; display: none;" class="card"></div>
        </div>

        <!-- Sidebar Sessions -->
        <div class="card">
          <div class="card-header">
            <h3>Active Security Sessions</h3>
          </div>
          <div id="sessions-list">
            <p style="color: var(--text-muted); font-size: 0.85rem;">Loading active sessions...</p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
