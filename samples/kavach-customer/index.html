<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kavach Wallet - Consumer Portal</title>
  <link rel="stylesheet" href="../shared/styles.css">
</head>
<body>
  <header>
    <h1><img src="https://raw.githubusercontent.com/Rajeev02/kavachid/main/assets/logo-icon-only.png" width="24" height="24" alt="KavachID Shield" style="vertical-align: middle;" /> <span class="app-name">Kavach Wallet</span></h1>
    <div class="nav-links">
      <span class="badge">Consumer</span>
      <button class="btn btn-secondary" id="logout-btn" style="display: none; padding: 0.5rem 1rem; font-size: 0.8rem;">Log Out</button>
    </div>
  </header>

  <main class="main-container">
    <div id="auth-view"></div>

    <div id="dashboard-view" style="display: none;">
      <!-- Stat Widgets -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-label">Checking Balance</div>
          <div class="stat-value success-text">$12,450.80</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Savings Balance</div>
          <div class="stat-value">$84,120.00</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Rewards Points</div>
          <div class="stat-value" style="color: #fbbf24;">4,250 PTS</div>
        </div>
      </div>

      <div class="dashboard-grid">
        <!-- Main Panel -->
        <div class="card">
          <div class="card-header">
            <h3>Send Secure Payment</h3>
            <span class="badge" style="background: rgba(16, 185, 129, 0.1); border-color: rgba(16, 185, 129, 0.3); color: var(--success-color);">DPoP SECURED</span>
          </div>
          
          <form id="payment-form">
            <div class="form-group">
              <label for="recipient">Recipient Username or Email</label>
              <input type="text" id="recipient" required placeholder="recipient@domain.com">
            </div>
            <div class="form-group">
              <label for="amount">Amount ($)</label>
              <input type="number" id="amount" required min="1" placeholder="100.00">
            </div>
            <button type="submit" class="btn" id="send-payment-btn">Authorize & Send Payment</button>
          </form>

          <div id="payment-status" style="margin-top: 1.5rem; display: none;" class="card">
            <!-- Payment success details -->
          </div>
        </div>

        <!-- Sidebar Panel -->
        <div class="card">
          <div class="card-header">
            <h3>Active Security Sessions</h3>
          </div>
          <div id="sessions-list">
            <p style="color: var(--text-muted); font-size: 0.85rem;">Loading active sessions...</p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
