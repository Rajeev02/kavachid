version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: kavachid-db
    environment:
      POSTGRES_USER: kavach
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_DB: kavachid
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kavach -d kavachid"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrations-runner:
    image: node:20-alpine
    container_name: kavachid-migrations
    working_dir: /app
    volumes:
      - .:/app
    environment:
      DATABASE_URL: "postgresql://kavach:supersecretpassword@db:5432/kavachid?schema=public"
    command: sh -c "npm ci && npx prisma db push"
    depends_on:
      db:
        condition: service_healthy

  kavachid:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kavachid-app
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://kavach:supersecretpassword@db:5432/kavachid?schema=public"
      KAVACHID_MASTER_KEY: "default-kavachid-master-key-must-change-32bytes"
      WEBHOOK_URL: "http://webhook-listener:8080/webhook-events"
      JWT_ACCESS_EXPIRES_IN: "15m"
      JWT_REFRESH_EXPIRES_IN: "7d"
    depends_on:
      db:
        condition: service_healthy
      migrations-runner:
        condition: service_completed_successfully

  webhook-listener:
    image: node:20-alpine
    container_name: kavachid-webhook-listener
    ports:
      - "8080:8080"
    command: >
      node -e "
      const http = require('http');
      http.createServer((req, res) => {
        let body = '';
        req.on('data', chunk => { body += chunk; });
        req.on('end', () => {
          console.log('\x1b[36m[Webhook Receiver]\x1b[0m Received', req.method, req.url);
          try {
            console.log(JSON.stringify(JSON.parse(body), null, 2));
          } catch {
            console.log(body);
          }
          res.writeHead(200, { 'Content-Type': 'application/json' });
          res.end(JSON.stringify({ received: true }));
        });
      }).listen(8080, () => console.log('Mock Webhook Receiver listening on port 8080'));
      "

volumes:
  pgdata:
