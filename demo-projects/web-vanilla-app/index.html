<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KavachID - Vanilla Web Demo</title>
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --success: #10b981;
      --danger: #ef4444;
    }

    body {
      margin: 0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg-gradient);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      width: 100%;
      max-width: 500px;
      padding: 2rem;
      box-sizing: border-box;
    }

    .card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    h1, h2 {
      margin-top: 0;
      text-align: center;
      letter-spacing: -0.5px;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    input {
      width: 100%;
      padding: 0.75rem;
      box-sizing: border-box;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--glass-border);
      color: var(--text-main);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: var(--accent);
    }

    .btn {
      width: 100%;
      padding: 0.75rem;
      border-radius: 8px;
      border: none;
      background: var(--accent);
      color: var(--text-main);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-bottom: 0.75rem;
    }

    .btn:hover {
      background: var(--accent-hover);
    }

    .btn-sec {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
    }

    .btn-sec:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .btn-danger {
      background: rgba(239, 68, 68, 0.15);
      color: var(--danger);
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    .btn-danger:hover {
      background: rgba(239, 68, 68, 0.25);
    }

    .alert {
      padding: 0.75rem;
      border-radius: 8px;
      font-size: 0.875rem;
      margin-bottom: 1rem;
      display: none;
    }

    .alert-error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: var(--danger);
    }

    .badge {
      display: inline-block;
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
      background: rgba(16, 185, 129, 0.15);
      color: var(--success);
      border: 1px solid rgba(16, 185, 129, 0.3);
    }

    .session-item {
      padding: 0.75rem;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 8px;
      margin-bottom: 0.5rem;
      border: 1px solid var(--glass-border);
      font-size: 0.875rem;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card" id="auth-panel">
      <h2><img src="https://raw.githubusercontent.com/Rajeev02/kavachid/main/assets/logo-icon-only.png" width="24" height="24" alt="KavachID Shield" style="vertical-align: middle;" /> KavachID Web</h2>
      <p style="text-align: center; color: var(--text-muted); font-size: 0.875rem; margin-bottom: 1.5rem;">Vanilla JavaScript Client Demo</p>
      
      <div class="alert alert-error" id="error-box"></div>

      <form id="login-form">
        <div class="form-group">
          <label for="email">Email or Username</label>
          <input type="text" id="email" required placeholder="user@domain.com">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn">Sign In</button>
        <button type="button" class="btn btn-sec" id="passkey-btn">🔐 Sign In with Passkey</button>
      </form>
    </div>

    <div class="card" id="dashboard-panel" style="display: none;">
      <h2>👤 Active Session</h2>
      <div style="text-align: center; margin-bottom: 1.5rem;">
        <span class="badge" id="user-badge">Authenticated</span>
      </div>

      <div style="margin-bottom: 1.5rem;">
        <h4 style="margin: 0 0 0.5rem 0; color: var(--text-muted);">Access Token Claims:</h4>
        <div id="claims-box" style="font-family: monospace; font-size: 0.8rem; background: rgba(0,0,0,0.3); padding: 0.75rem; border-radius: 8px; max-height: 150px; overflow-y: auto;"></div>
      </div>

      <button class="btn btn-sec" id="register-passkey-btn">➕ Register biometric Passkey</button>
      <button class="btn btn-sec" id="test-api-btn">📡 Call Protected API (with DPoP)</button>
      <button class="btn btn-danger" id="logout-btn">Log Out</button>

      <div style="margin-top: 1.5rem;">
        <h4 style="margin: 0 0 0.5rem 0; color: var(--text-muted);">Other Active Sessions:</h4>
        <div id="sessions-list"></div>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
